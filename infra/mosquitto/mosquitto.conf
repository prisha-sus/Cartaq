# ============================================================
# Cartaq — Eclipse Mosquitto MQTT Broker Configuration
# Role 4: Digital signage and IoT alert dispatch
#
# Topic schema:
#   cartaq/advisory/{city}/{h3_index}   Full multilingual advisory JSON
#   cartaq/alert/{category}/{h3_index}  Compact IoT payload
#   $SYS/#                              Broker system statistics
# ============================================================

# ── Listener configuration ───────────────────────────────────
listener 1883
protocol mqtt

# WebSocket listener (browser/signage clients)
listener 9001
protocol websockets

# ── Authentication ───────────────────────────────────────────
# Dev mode: anonymous access allowed on localhost.
# To enable password auth in production:
#   1. docker exec cartaq_mosquitto mosquitto_passwd -c /mosquitto/config/passwd cartaq
#   2. Change allow_anonymous to false and uncomment password_file
allow_anonymous true
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
persistence_file cartaq_mosquitto.db

# ── Retained messages ────────────────────────────────────────
# Retained messages on cartaq/advisory/# allow digital signage displays
# to receive the last known advisory immediately upon connecting.
retain_available true

# ── Logging ──────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Connection limits ────────────────────────────────────────
max_connections 500
max_inflight_messages 20
max_queued_messages 1000

# ── Keep-alive ───────────────────────────────────────────────
keepalive_interval 60
